# RipCat website screenshot scenes
# format:  name | extra launch args | settle seconds
# Base args (always applied): -screenshot-mode true -skip-onboarding true -seed-favorites true
# Location is pinned to Santa Barbara in screenshot mode; dark appearance is forced.

today            |                                          | 10
today-tide-curve | -today-scroll tide-curve                 | 11
favorites        | -open-tab favorites                      | 8
map-sb-channel   | -open-tab map -map-frame sb-channel -hide-marine true -show-buoys true -show-stations true | 18
map-sca-timeline | -open-tab map -sca-step 3                | 16
zone-forecast    | -open-tab map -select-zone PZZ650        | 18
buoy-detail      | -open-tab map -select-buoy 46053         | 20
settings         | -open-tab settings                       | 8
calendars        | -open-tab calendars                      | 10
# SCA timeline animation frames (the website cross-fades these day steps)
sca-frame-0      | -open-tab map -sca-step 0                | 16
sca-frame-1      | -open-tab map -sca-step 2                | 16
sca-frame-2      | -open-tab map -sca-step 4                | 16
sca-frame-3      | -open-tab map -sca-step 6                | 16
